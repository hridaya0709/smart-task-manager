spring.application.name=smart-task-manager

# Ollama / AI categorization is disabled by default in shared configuration.
# Enable and configure these locally (for example in application-local.properties)
# when Ollama is available on the developer machine.
ollama.enabled=false
# ollama.url=http://localhost:11434
# ollama.model=mistral
# Timeout settings for Ollama HTTP requests (in seconds)
ollama.connect-timeout-seconds=5
ollama.read-timeout-seconds=30